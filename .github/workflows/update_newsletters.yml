name: Daily Newsletter Auto-Discovery

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  discover-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run all auto-discovery crawlers
        continue-on-error: true
        run: |
          echo "Starting auto-discovery pipeline..."
          for fetcher in fetchers/*.py; do
            if [ -f "$fetcher" ] && [ "$(basename "$fetcher")" != "__init__.py" ]; then
              echo "----------------------------------------"
              echo "Running $fetcher..."
              python "$fetcher" || echo "Warning: $fetcher encountered an error, continuing..."
            fi
          done
          
      - name: Aggregate and Categorize Newsletters
        run: |
          echo "----------------------------------------"
          echo "Running aggregate.py..."
          python aggregate.py
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the modified files
          git add README.md
          
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No new newsletters were added today. Skipping commit."
          else
            git commit -m "docs: auto-discover and aggregate new tech newsletters"
            git push
          fi
