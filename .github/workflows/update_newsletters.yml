name: Daily Newsletter Auto-Discovery

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set matrix for fetchers
        id: set-matrix
        run: |
          FETCHERS=$(ls fetchers/*.py | grep -v utils.py | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$FETCHERS" >> $GITHUB_OUTPUT

  fetch:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fetcher: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests codespell

      - name: Run Fetcher (${{ matrix.fetcher }})
        env:
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
        run: |
          echo "Running ${{ matrix.fetcher }}..."
          python ${{ matrix.fetcher }}

      - name: Upload Newsletter Queue Artifact
        uses: actions/upload-artifact@v4
        with:
          name: queue-${{ strategy.job-index }}
          path: newsletters_*.json
          if-no-files-found: ignore

  aggregate-and-commit:
    needs: fetch
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests codespell

      - name: Download all Queue Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          pattern: queue-*
          merge-multiple: true

      - name: Aggregate and Categorize Newsletters
        run: |
          echo "----------------------------------------"
          echo "Running aggregate.py..."
          python aggregate.py
          
      - name: Auto-Fix Typos (Codespell)
        continue-on-error: true
        run: |
          echo "Running codespell on README.md..."
          codespell README.md --write-changes

      - name: Validate New URLs and Auto-Remove Dead Links
        run: python checks/url_check.py
        
      - name: Format and Sort Tables
        run: python checks/format_tables.py
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the modified files
          git add README.md
          
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No changes found. Skipping commit."
          else
            git commit -m "docs: auto-discover newsletters, remove dead links, and fix typos"
            git push
          fi
