name: PR Lint Checker

on:
  pull_request:
    branches: [ main ]

  workflow_dispatch:
permissions:
  contents: write

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # Check out the PR branch instead of the merge commit so we can push back to it

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests codespell

      - name: Auto-Fix Typos (Codespell)
        continue-on-error: true
        run: |
          echo "Running codespell on README.md..."
          codespell README.md --write-changes

      - name: Validate URLs and Auto-Remove Dead Links
        run: python checks/url_check.py
        
      - name: Commit and Push Changes (if any)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add README.md
          
          if git diff --staged --quiet; then
            echo "No broken links or typos found. Nothing to commit."
          else
            git commit -m "docs: auto-remove broken links and fix typos"
            git push
          fi
